steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE_URI}
      - --build-arg
      - VITE_GCP_API_KEY=${_VITE_GCP_API_KEY}
      - --build-arg
      - VITE_FCM_VAPID_KEY=${_VITE_FCM_VAPID_KEY}
      - --build-arg
      - VITE_MAPS_API_KEY=${_VITE_MAPS_API_KEY}
      - --build-arg
      - VITE_GEMINI_API_KEY=${_VITE_GEMINI_API_KEY}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_IMAGE_URI}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_IMAGE_URI}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated

images:
  - ${_IMAGE_URI}
