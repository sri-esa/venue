steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '--file=notifications/Dockerfile'
      - '--tag=gcr.io/$PROJECT_ID/notifications:$SHORT_SHA'
      - '--tag=gcr.io/$PROJECT_ID/notifications:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/notifications']
    waitFor: ['build']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'notifications'
      - '--image=gcr.io/$PROJECT_ID/notifications:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--update-env-vars=PROJECT_ID=$PROJECT_ID,NODE_ENV=production'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--max-instances=3'
      - '--port=8082'
    waitFor: ['push']

images:
  - 'gcr.io/$PROJECT_ID/notifications:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/notifications:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE
