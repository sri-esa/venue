name: attendee_app
description: Smart venue attendee application
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ">=3.3.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  # Firebase — pin to compatible BOM family (v3.x)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.5
  # AR — oldest stable; namespace fix applied separately
  arcore_flutter_plugin: ^0.1.0
  # Maps
  google_maps_flutter: ^2.9.0
  # Routing
  go_router: ^14.6.2
  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Networking
  dio: ^5.7.0
  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.3
  # Image
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  # AI
  google_generative_ai: ^0.4.6
  # Location & permissions
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  # Storage
  shared_preferences: ^2.3.2
  # Utilities
  intl: ^0.19.0
  logger: ^2.4.0
  json_annotation: ^4.9.0
  # Crypto — required by gemini_service.dart
  crypto: ^3.0.5
  # Vector math — required by ar_service.dart (direct dependency)
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_lint: ^2.3.13
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
